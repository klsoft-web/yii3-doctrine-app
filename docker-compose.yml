services:

  app:
    build: .
    ports:
      - "8383:8080"
    volumes:
      # Mount for development
      - ./src:/app/src
      - ./config/common:/app/config/common
      - ./config/console:/app/config/console
      - ./config/web:/app/config/web
    command: php ./yii serve 0.0.0.0

  mysql:
    image: mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=mysite
      - MYSQL_USER=mysite
      - MYSQL_PASSWORD=secret
    volumes:
      -  yii3-doctrine-app-db-data:/var/lib/mysql
      
volumes:
  yii3-doctrine-app-db-data: